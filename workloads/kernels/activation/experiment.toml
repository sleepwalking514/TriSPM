[kernel]
name = "activation"
env_prefix = "ACTIVATION_"
tag_template = "n{SIZE}-bs{BLOCK_SIZE}"
expect_spm = false

[params]
SIZE = 1024
BLOCK_SIZE = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[build]
c_macros = [
    "SIZE={SIZE}",
    "BLOCK_SIZE={BLOCK_SIZE}",
    "ACTIVATION_WARMUP_ITERS={WARMUP_ITERS}",
    "ACTIVATION_MEASURE_ITERS={MEASURE_ITERS}",
    "ACTIVATION_FLUSH_BEFORE_ROI={FLUSH_BEFORE_ROI}",
    "ACTIVATION_CHECK_RESULT={CHECK_RESULT}",
]

[presets.steady]
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0
