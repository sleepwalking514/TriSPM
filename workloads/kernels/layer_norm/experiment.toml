[kernel]
name = "layer_norm"
env_prefix = ""
tag_template = "{M}x{N}"
expect_spm = false

[params]
M = 32
N = 64
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[build]
c_macros = [
    "M={M}",
    "N={N}",
    "CHECK_RESULT={CHECK_RESULT}",
    "LAYERNORM_FLUSH_BEFORE_ROI={LAYERNORM_FLUSH_BEFORE_ROI}",
]

[presets.phase35-small]
M = 32
N = 64
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-large]
M = 512
N = 1024
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-row-resident-small]
M = 32
N = 64
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-row-resident-large]
M = 512
N = 1024
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-row-resident-producer-small]
M = 32
N = 64
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-row-resident-producer-large]
M = 512
N = 1024
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[preset_env.phase35-row-resident-small]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-large]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-producer-small]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "producer_store"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-producer-large]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "producer_store"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-d3-small]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_ENABLE_SPM_PROMOTION_PROFITABILITY = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-d3-large]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_ENABLE_SPM_PROMOTION_PROFITABILITY = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[presets.phase35-d3-small]
M = 32
N = 64
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1

[presets.phase35-d3-large]
M = 512
N = 1024
CHECK_RESULT = 1
LAYERNORM_FLUSH_BEFORE_ROI = 1
