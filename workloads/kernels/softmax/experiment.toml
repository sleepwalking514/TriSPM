[kernel]
name = "softmax"
env_prefix = "SOFTMAX_"
tag_template = "{M}x{N}/canonical-bn{BLOCK_N}-spmrb{SPM_ROW_BLOCK}-spmrg{SPM_ROW_GROUP_BLOCKS}"
expect_spm = false

[params]
M = 32
N = 64
BLOCK_N = 64
SPM_ROW_BLOCK = 1
SPM_ROW_GROUP_BLOCKS = 1
SPM_INTERNAL_ROW_BLOCK = 0
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[build]
c_macros = [
    "M={M}",
    "N={N}",
    "BLOCK_N={BLOCK_N}",
    "SPM_ROW_BLOCK={SPM_ROW_BLOCK}",
    "SPM_ROW_GROUP_BLOCKS={SPM_ROW_GROUP_BLOCKS}",
    "SOFTMAX_SPM_INTERNAL_ROW_BLOCK={SPM_INTERNAL_ROW_BLOCK}",
    "SOFTMAX_WARMUP_ITERS={WARMUP_ITERS}",
    "SOFTMAX_MEASURE_ITERS={MEASURE_ITERS}",
    "SOFTMAX_FLUSH_BEFORE_ROI={FLUSH_BEFORE_ROI}",
    "SOFTMAX_CHECK_RESULT={CHECK_RESULT}",
]

[mode_params.cache]
SPM_ROW_BLOCK = 1
SPM_ROW_GROUP_BLOCKS = 1
SPM_INTERNAL_ROW_BLOCK = 0

[presets.steady]
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0

[presets.phase35-smoke]
M = 32
N = 64
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.canonical-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-steady-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0
CHECK_RESULT = 1

[preset_env.phase35-row-resident-smoke]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.canonical-spm-direct-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-producer-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "producer_store"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-dma-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "dma_prefetch"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-block-dma-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "row_block_dma"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "65536"
TRITON_SPM_SOFTMAX_INTERNAL_ROW_BLOCK = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-block-dma-exp-cache-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "row_block_dma"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "65536"
TRITON_SPM_SOFTMAX_INTERNAL_ROW_BLOCK = "1"
TRITON_SPM_SOFTMAX_CACHE_EXP = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-block-dma-rg16-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "row_block_dma"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "65536"
TRITON_SPM_SOFTMAX_INTERNAL_ROW_BLOCK = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[presets.phase35-row-resident-smoke]
M = 32
N = 64
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.canonical-spm-direct-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-producer-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-dma-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-block-dma-large-row]
M = 128
N = 1024
BLOCK_N = 64
SPM_ROW_BLOCK = 2
SPM_ROW_GROUP_BLOCKS = 8
SPM_INTERNAL_ROW_BLOCK = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-block-dma-exp-cache-large-row]
M = 128
N = 1024
BLOCK_N = 64
SPM_ROW_BLOCK = 2
SPM_ROW_GROUP_BLOCKS = 8
SPM_INTERNAL_ROW_BLOCK = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-block-dma-rg16-large-row]
M = 128
N = 1024
BLOCK_N = 64
SPM_ROW_BLOCK = 2
SPM_ROW_GROUP_BLOCKS = 16
SPM_INTERNAL_ROW_BLOCK = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[sweeps.blocking]
values = [
    { name = "canonical", BLOCK_N = 64, SPM_ROW_BLOCK = 1, SPM_ROW_GROUP_BLOCKS = 1, SPM_INTERNAL_ROW_BLOCK = 0 },
]
tag_template = "{M}x{N}/canonical-bn{BLOCK_N}-spmrb{SPM_ROW_BLOCK}-spmrg{SPM_ROW_GROUP_BLOCKS}"

[sweeps.spm_blocking]
values = [
    { name = "rb2rg4", BLOCK_N = 64, SPM_ROW_BLOCK = 2, SPM_ROW_GROUP_BLOCKS = 4, SPM_INTERNAL_ROW_BLOCK = 1 },
    { name = "rb2rg8", BLOCK_N = 64, SPM_ROW_BLOCK = 2, SPM_ROW_GROUP_BLOCKS = 8, SPM_INTERNAL_ROW_BLOCK = 1 },
    { name = "rb2rg16", BLOCK_N = 64, SPM_ROW_BLOCK = 2, SPM_ROW_GROUP_BLOCKS = 16, SPM_INTERNAL_ROW_BLOCK = 1 },
    { name = "rb4rg4", BLOCK_N = 64, SPM_ROW_BLOCK = 4, SPM_ROW_GROUP_BLOCKS = 4, SPM_INTERNAL_ROW_BLOCK = 1 },
    { name = "rb4rg8", BLOCK_N = 64, SPM_ROW_BLOCK = 4, SPM_ROW_GROUP_BLOCKS = 8, SPM_INTERNAL_ROW_BLOCK = 1 },
]
tag_template = "{M}x{N}/canonical-bn{BLOCK_N}-spmrb{SPM_ROW_BLOCK}-spmrg{SPM_ROW_GROUP_BLOCKS}"

[sweeps.sizes]
values = [
    { name = "64x512", M = 64, N = 512, BLOCK_N = 64 },
    { name = "128x512", M = 128, N = 512, BLOCK_N = 64 },
    { name = "128x1024", M = 128, N = 1024, BLOCK_N = 64 },
    { name = "256x1024", M = 256, N = 1024, BLOCK_N = 64 },
]
tag_template = "{M}x{N}/canonical-bn{BLOCK_N}-spmrb{SPM_ROW_BLOCK}-spmrg{SPM_ROW_GROUP_BLOCKS}"
