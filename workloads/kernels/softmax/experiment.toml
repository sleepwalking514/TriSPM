[kernel]
name = "softmax"
env_prefix = "SOFTMAX_"
tag_template = "{M}x{N}/{SCHEDULE}-bn{BLOCK_N}-rb{ROW_BLOCK}-rg{ROW_GROUP_BLOCKS}"
expect_spm = false

[params]
M = 32
N = 64
BLOCK_N = 64
SCHEDULE = "canonical"
SCHEDULE_ID = 0
ROW_BLOCK = 1
ROW_GROUP_BLOCKS = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[build]
c_macros = [
    "M={M}",
    "N={N}",
    "BLOCK_N={BLOCK_N}",
    "SOFTMAX_SCHEDULE_ID={SCHEDULE_ID}",
    "ROW_BLOCK={ROW_BLOCK}",
    "ROW_GROUP_BLOCKS={ROW_GROUP_BLOCKS}",
    "SOFTMAX_WARMUP_ITERS={WARMUP_ITERS}",
    "SOFTMAX_MEASURE_ITERS={MEASURE_ITERS}",
    "SOFTMAX_FLUSH_BEFORE_ROI={FLUSH_BEFORE_ROI}",
    "SOFTMAX_CHECK_RESULT={CHECK_RESULT}",
]

[presets.steady]
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0

[presets.phase35-smoke]
M = 32
N = 64
BLOCK_N = 64
SCHEDULE = "canonical"
SCHEDULE_ID = 0
ROW_BLOCK = 1
ROW_GROUP_BLOCKS = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-large-row]
M = 128
N = 1024
BLOCK_N = 64
SCHEDULE = "canonical"
SCHEDULE_ID = 0
ROW_BLOCK = 1
ROW_GROUP_BLOCKS = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.canonical-large-row]
M = 128
N = 1024
BLOCK_N = 64
SCHEDULE = "canonical"
SCHEDULE_ID = 0
ROW_BLOCK = 1
ROW_GROUP_BLOCKS = 1
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-steady-large-row]
