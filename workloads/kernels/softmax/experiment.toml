[kernel]
name = "softmax"
env_prefix = "SOFTMAX_"
tag_template = "{M}x{N}-bn{BLOCK_N}"
expect_spm = false

[params]
M = 32
N = 64
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[build]
c_macros = [
    "M={M}",
    "N={N}",
    "BLOCK_N={BLOCK_N}",
    "SOFTMAX_WARMUP_ITERS={WARMUP_ITERS}",
    "SOFTMAX_MEASURE_ITERS={MEASURE_ITERS}",
    "SOFTMAX_FLUSH_BEFORE_ROI={FLUSH_BEFORE_ROI}",
    "SOFTMAX_CHECK_RESULT={CHECK_RESULT}",
]

[presets.steady]
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0

[presets.phase35-smoke]
M = 32
N = 64
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-steady-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 2
MEASURE_ITERS = 5
FLUSH_BEFORE_ROI = 0
CHECK_RESULT = 1

[preset_env.phase35-row-resident-smoke]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-producer-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "producer_store"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[preset_env.phase35-row-resident-dma-large-row]
TRITON_ENABLE_SPM_ROW_RESIDENT_REDUCTIONS = "1"
TRITON_SPM_ROW_RESIDENT_PRODUCER_PASS = "dma_prefetch"
TRITON_SPM_ROW_RESIDENT_MAX_BYTES = "8192"
TRITON_SPM_PROMOTION_REPORT = "1"

[presets.phase35-row-resident-smoke]
M = 32
N = 64
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-producer-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1

[presets.phase35-row-resident-dma-large-row]
M = 128
N = 1024
BLOCK_N = 64
WARMUP_ITERS = 0
MEASURE_ITERS = 1
FLUSH_BEFORE_ROI = 1
CHECK_RESULT = 1
