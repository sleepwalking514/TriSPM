[graph]
name = "attention_smoke"
description = "Attention-facing graph smoke with realistic QK/PV layouts: layer_norm -> q/k/v -> k_transpose -> qk -> softmax -> pv -> residual_add -> activation."

[harness]
source = "harness.c"

[harness.params]
SEQ = 32
D_MODEL = 32
HEAD_DIM = 16
BLOCK = 16
CHECK_RESULT = 1
FLUSH_BEFORE_ROI = 1

[harness.build]
c_macros = [
    "GRAPH_SEQ={SEQ}",
    "GRAPH_D_MODEL={D_MODEL}",
    "GRAPH_HEAD_DIM={HEAD_DIM}",
    "GRAPH_BLOCK={BLOCK}",
    "GRAPH_CHECK_RESULT={CHECK_RESULT}",
    "GRAPH_FLUSH_BEFORE_ROI={FLUSH_BEFORE_ROI}",
]

[tensors.x]
kind = "external_input"
read_only = true
dma_only = false
note = "LayerNorm input stays cacheable because the reduction path defaults to cache."

[tensors.gamma]
kind = "external_weight"
read_only = true
dma_only = false
note = "LayerNorm scale has reduction/scalar-style access; keep cacheable."

[tensors.beta]
kind = "external_weight"
read_only = true
dma_only = false
note = "LayerNorm bias has reduction/scalar-style access; keep cacheable."

[tensors.ln_out]
kind = "intermediate"
producer = "layer_norm"
consumers = ["q_proj", "k_proj", "v_proj"]

[tensors.wq]
kind = "external_weight"
read_only = true
dma_only = true

[tensors.wk]
kind = "external_weight"
read_only = true
dma_only = true

[tensors.wv]
kind = "external_weight"
read_only = true
dma_only = true

[tensors.q]
kind = "intermediate"
producer = "q_proj"
consumers = ["qk"]
note = "Shape [SEQ, HEAD_DIM]."

[tensors.k]
kind = "intermediate"
producer = "k_proj"
consumers = ["k_transpose"]
note = "Shape [SEQ, HEAD_DIM]; transposed before QK."

[tensors.k_t]
kind = "intermediate"
producer = "k_transpose"
consumers = ["qk"]
note = "Shape [HEAD_DIM, SEQ], making QK a real [SEQ, HEAD_DIM] x [HEAD_DIM, SEQ] matmul."

[tensors.v]
kind = "intermediate"
producer = "v_proj"
consumers = ["pv"]
note = "Shape [SEQ, HEAD_DIM]."

[tensors.scores]
kind = "intermediate"
producer = "qk"
consumers = ["softmax"]
note = "Shape [SEQ, SEQ]."

[tensors.probs]
kind = "intermediate"
producer = "softmax"
consumers = ["pv"]
note = "Shape [SEQ, SEQ]."

[tensors.attn]
kind = "intermediate"
producer = "pv"
consumers = ["residual_add"]
note = "Shape [SEQ, HEAD_DIM]."

[tensors.residual]
kind = "external_input"
read_only = true
dma_only = false
note = "Shape [SEQ, HEAD_DIM]."

[tensors.resid_out]
kind = "intermediate"
producer = "residual_add"
consumers = ["activation"]

[tensors.act_out]
kind = "graph_output"
producer = "activation"

[nodes.layer_norm]
kernel = "layer_norm"
args = ["x", "gamma", "beta", "ln_out"]
tag = "graph/attention_smoke/layer_norm"

[nodes.layer_norm.params]
M = 32
N = 32
CHECK_RESULT = 0
LAYERNORM_FLUSH_BEFORE_ROI = 1

[nodes.q_proj]
kernel = "matmul"
args = ["ln_out", "wq", "q"]
tag = "graph/attention_smoke/q_proj"

[nodes.q_proj.params]
M = 32
N = 16
K = 32
BLOCK_SIZE_M = 32
BLOCK_SIZE_N = 16
BLOCK_SIZE_K = 32
CHECK_RESULT = 0

[nodes.k_proj]
kernel = "matmul"
args = ["ln_out", "wk", "k"]
tag = "graph/attention_smoke/k_proj"

[nodes.k_proj.params]
M = 32
N = 16
K = 32
BLOCK_SIZE_M = 32
BLOCK_SIZE_N = 16
BLOCK_SIZE_K = 32
CHECK_RESULT = 0

[nodes.v_proj]
kernel = "matmul"
args = ["ln_out", "wv", "v"]
tag = "graph/attention_smoke/v_proj"

[nodes.v_proj.params]
M = 32
N = 16
K = 32
BLOCK_SIZE_M = 32
BLOCK_SIZE_N = 16
BLOCK_SIZE_K = 32
CHECK_RESULT = 0

[nodes.k_transpose]
kernel = "transpose"
args = ["k", "k_t"]
tag = "graph/attention_smoke/k_transpose"

[nodes.k_transpose.params]
M = 32
N = 16
BLOCK_M = 16
BLOCK_N = 16
CHECK_RESULT = 0

[nodes.qk]
kernel = "matmul"
args = ["q", "k_t", "scores"]
tag = "graph/attention_smoke/qk"

[nodes.qk.params]
M = 32
N = 32
K = 16
BLOCK_SIZE_M = 32
BLOCK_SIZE_N = 16
BLOCK_SIZE_K = 16
CHECK_RESULT = 0

[nodes.softmax]
kernel = "softmax"
args = ["scores", "probs"]
tag = "graph/attention_smoke/softmax"

[nodes.softmax.params]
M = 32
N = 32
BLOCK_N = 32
SPM_ROW_BLOCK = 1
SPM_ROW_GROUP_BLOCKS = 1
SPM_INTERNAL_ROW_BLOCK = 0
CHECK_RESULT = 0

[nodes.pv]
kernel = "matmul"
args = ["probs", "v", "attn"]
tag = "graph/attention_smoke/pv"

[nodes.pv.params]
M = 32
N = 16
K = 32
BLOCK_SIZE_M = 32
BLOCK_SIZE_N = 16
BLOCK_SIZE_K = 32
CHECK_RESULT = 0

[nodes.residual_add]
kernel = "residual_add"
args = ["attn", "residual", "resid_out"]
tag = "graph/attention_smoke/residual_add"

[nodes.residual_add.params]
SIZE = 512
BLOCK_SIZE = 16
CHECK_RESULT = 0

[nodes.activation]
kernel = "activation"
args = ["resid_out", "act_out"]
tag = "graph/attention_smoke/activation"

[nodes.activation.params]
SIZE = 512
BLOCK_SIZE = 16
CHECK_RESULT = 0
